# # Docker Hub pull secret, generated by Helm from .Values.imagePullSecret.
# apiVersion: v1
# kind: Secret
# metadata:
#   name: {{ .Values.imagePullSecret.name }}
#   namespace: {{ .Release.Namespace }}
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"email\":\"%s\",\"auth\":\"%s\"}}}"
#       .Values.imagePullSecret.registry
#       .Values.imagePullSecret.username
#       .Values.imagePullSecret.password
#       .Values.imagePullSecret.email
#       (printf "%s:%s" .Values.imagePullSecret.username .Values.imagePullSecret.password | b64enc)
#       | b64enc }}

{{- if .Values.imagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecret.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "frontend.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}"
      .Values.imagePullSecret.registry
      .Values.imagePullSecret.username
      .Values.imagePullSecret.password
      (printf "%s:%s" .Values.imagePullSecret.username .Values.imagePullSecret.password | b64enc)
      | b64enc }}
{{- end }}
